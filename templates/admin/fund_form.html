{% extends 'admin/base_admin.html' %}{% block admin_content %}<h1>{{ 'Edit' if fund else 'Create' }} Fund</h1><div class="card"><div class="admin-payment-note"><b>Payment setup:</b> receiving UPI is not configured here. Add <code>PLATFORM_UPI_ID</code> and <code>PLATFORM_PAYEE_NAME</code> in Railway environment variables. Users will only see the branded QR flow.</div><br><form method="post"><div class="grid two"><div class="field"><label>Fund name</label><input name="name" value="{{ fund.name if fund else '' }}" required></div><div class="field"><label>Tagline</label><input name="tagline" value="{{ fund.tagline if fund else '' }}"></div><div class="field"><label>Slot value</label><input type="number" step="0.01" name="slot_value" value="{{ fund.slot_value if fund else 1000 }}" required></div><div class="field"><label>Expected interest / benefit rate %</label><input type="number" step="0.01" name="expected_interest_rate" value="{{ fund.expected_interest_rate if fund else 12 }}" required></div><div class="field"><label>Minimum slots user must purchase</label><input type="number" name="min_slots" value="{{ fund.min_slots if fund else 1 }}" required></div><div class="field"><label>Maximum slots allowed</label><input type="number" name="max_slots" value="{{ fund.max_slots if fund else 100 }}" required></div><div class="field"><label>Maturity date</label><input type="date" name="maturity_date" value="{{ fund.maturity_date if fund else '' }}" required></div><div class="field"><label>Early exit charge %</label><input type="number" step="0.01" name="early_exit_charge_percent" value="{{ fund.early_exit_charge_percent if fund else 0 }}"></div></div><div class="field"><label>Description</label><textarea name="description" required>{{ fund.description if fund else '' }}</textarea></div><div class="field"><label>Risk / disclosure note</label><textarea name="risk_note">{{ fund.risk_note if fund else 'Expected returns are subject to plan terms and applicable law.' }}</textarea></div><label><input type="checkbox" name="is_active" {% if not fund or fund.is_active %}checked{% endif %}> Active and visible to users</label><button class="btn primary">Save Fund</button></form></div>{% endblock %}
